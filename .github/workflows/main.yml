name: "RDP_Limpo_Fabrica"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "Fluxo_01: Preparar Senha"
        shell: powershell
        run: |
          # Define a senha do administrador padrão (runneradmin)
          $p = "${{ secrets.otimizacao2 }}"
          net user runneradmin $p
          # Garante que ele tenha permissão de acesso, como vem de fábrica
          net localgroup "Remote Desktop Users" runneradmin /add

      - name: "Fluxo_02: Habilitar RDP"
        shell: powershell
        run: |
          # Apenas liga o interruptor do RDP sem mudar nenhuma trava de segurança
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: "Fluxo_03: Baixar e Rodar Cloudflared"
        shell: powershell
        run: |
          # Download direto oficial
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "C:\cloudflared.exe"
          # Inicia o túnel gravando o log para você pegar o link
          Start-Process -FilePath "C:\cloudflared.exe" -ArgumentList "tunnel --url rdp://127.0.0.1:3389" -RedirectStandardError "v_log.txt"

      - name: "Fluxo_04: Pegar Link de Acesso"
        shell: powershell
        run: |
          $ep = ""
          while (!$ep) {
            Start-Sleep -Seconds 5
            if (Test-Path "v_log.txt") {
              $log = Get-Content "v_log.txt"
              $ep = $log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
            }
          }
          # Limpa o link para você copiar no mstsc do PC
          $cleanLink = $ep.Replace("https://", "")
          Write-Host "----------------------------------------------"
          Write-Host "COPIE ESTE ENDEREÇO: $cleanLink"
          Write-Host "USUARIO: runneradmin"
          Write-Host "----------------------------------------------"
          # Mantém a máquina viva por 6 horas
          Start-Sleep -Seconds 21600
