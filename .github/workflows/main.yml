name: "RDP_Turbo_Final_Fixed"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "Fluxo_01: Checkout"
        uses: actions/checkout@v4

      - name: "Fluxo_02: Execução em Alta Velocidade"
        shell: powershell
        run: |
          # 1. Download do Cloudflared (Turbo)
          $jobCF = Start-Job -ScriptBlock {
            curl.exe -L -o "C:\cf.exe" "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          }

          # 2. Configura Senha e RDP
          net user runneradmin "${{ secrets.otimizacao2 }}"
          net localgroup "Remote Desktop Users" runneradmin /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # 3. Executa Otimização .bat
          if (Test-Path "Otimizar_2022.bat") {
              Start-Process "cmd.exe" -ArgumentList "/c Otimizar_2022.bat" -Wait
          }

          # 4. Inicia Túnel
          Wait-Job $jobCF
          Start-Process "C:\cf.exe" -ArgumentList "tunnel --url rdp://127.0.0.1:3389" -RedirectStandardError "v.txt"
          
          # 5. Captura do Link (Corrigido)
          Write-Host "Aguardando link da Cloudflare..."
          $linkCloudflare = ""
          while (!$linkCloudflare) {
            if (Test-Path "v.txt") {
              $content = Get-Content "v.txt"
              $linkCloudflare = $content | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
            }
            if (!$linkCloudflare) { Start-Sleep -Seconds 2 }
          }
          
          $cleanLink = $linkCloudflare.Replace("https://", "")
          Write-Host "`n=============================================="
          Write-Host "CONECTE AGORA: $cleanLink"
          Write-Host "USUARIO: runneradmin"
          Write-Host "=============================================="
          
          Start-Sleep -Seconds 21600
