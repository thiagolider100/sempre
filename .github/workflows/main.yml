name: "RDP_Ultra_Turbo_Final"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: "Fluxo_01: Preparação Total"
        uses: actions/checkout@v4

      - name: "Fluxo_02: Execução em Alta Velocidade"
        shell: powershell
        run: |
          # 1. Inicia download do Cloudflared em background (Turbo)
          $down = Start-Job -ScriptBlock {
            curl.exe -L -o "C:\cf.exe" "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          }

          # 2. Configura a senha e permissões de fábrica
          net user runneradmin "${{ secrets.otimizacao2 }}"
          net localgroup "Remote Desktop Users" runneradmin /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # 3. Executa seu arquivo de otimização .bat (se ele existir no repositório)
          if (Test-Path "Otimizar_2022.bat") {
              Start-Process "cmd.exe" -ArgumentList "/c Otimizar_2022.bat" -Wait
          }

          # 4. Finaliza o download e inicia o túnel instantaneamente
          Wait-Job $down
          Start-Process "C:\cf.exe" -ArgumentList "tunnel --url rdp://127.0.0.1:3389" -RedirectStandardError "v.txt"
          
          # 5. Captura o link agressiva (checa a cada 1 segundo)
          $l = ""
          while (!$l) {
            if (Test-Path "v.txt") {
              $l = Select-String -Path "v.txt" -Pattern "https://.*\.trycloudflare\.com" | % { $_.Matches.Value }
            }
            Start-Sleep -Seconds 1
          }
          
          $clean = $l.Replace("https://", "")
          Write-Host "`n=============================================="
          Write-Host "CONECTE AGORA: $clean"
          Write-Host "USUARIO: runneradmin"
          Write-Host "=============================================="
          Start-Sleep -Seconds 21600
